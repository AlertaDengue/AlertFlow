backend: compose
env-file: .env
defaults:
  group: dev
groups:
  dev:
    project-name: alertflow
    config-path:
      - docker/compose.yaml
      - docker/compose-dev.yaml
    env-file: .env
    services:
      default: scheduler,triggerer,webserver,worker
      available:
        - name: scheduler
        - name: triggerer
        - name: webserver
        - name: worker

  prod:
    project-name: alertflow
    config-path:
      - docker/compose.yaml
      - docker/compose-prod.yaml
    env-file: .env
    services:
      default: scheduler,triggerer,webserver,worker
      available:
        - name: scheduler
        - name: triggerer
        - name: webserver
        - name: worker
